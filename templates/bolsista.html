<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Validação de Bolsista - Lab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='CNAT Maker.png') }}" alt="Logo do Lab">
        <h1>Validação de Bolsista</h1>
    </header>
    <main>
        <form action="{{ url_for('bolsista') }}" method="post">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="matricula">Matrícula:</label>
            <input type="text" id="matricula" name="matricula" required>

            <button type="submit" class="btn">Validar e Abrir Porta</button>
        </form>
        <a class="btn voltar" href="{{ url_for('home') }}">Voltar</a>
    </main>
    <footer>
        <p>&copy; 2025 Lab. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
