<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Visitante - CNATMaker</title>
    <style>
        /* Reset CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            line-height: 1.6;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main Content com imagem de fundo */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://lh3.googleusercontent.com/p/AF1QipPazkvEhFazil1umg40zjbFvha7R9gnRqIWCAAT=s680-w680-h510');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* Título flutuante */
        .floating-title {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        /* Formulário */
        form {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 100px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1em;
        }

        /* Botões */
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #78d14f;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
            text-align: center;
        }

        .btn:hover {
            background-color: #5cb85c;
            transform: translateY(-2px);
        }

        .voltar {
            background-color: #a7a7a7;
            margin-top: 20px;
        }

        .voltar:hover {
            background-color: #8c8c8c;
        }

        /* Navbar que aparece ao rolar */
        .content-navbar {
            background-color: #a7a7a7;
            padding: 15px 0;
            width: 100%;
            text-align: center;
            position: fixed;
            bottom: -100px;
            transition: bottom 0.3s ease;
            z-index: 100;
        }

        body.scrolled .content-navbar {
            bottom: 0;
        }

        .content-navbar ul {
            display: inline-flex;
            list-style: none;
        }

        .content-navbar li {
            margin: 0 20px;
        }

        .content-navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .content-navbar a:hover {
            background-color: #78d14f;
        }

        /* Footer */
        footer {
            background-color: #78d14f;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            margin-top: auto;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .floating-title {
                font-size: 2em;
                top: 15%;
            }
            
            form {
                margin-top: 80px;
            }
            
            .content-navbar ul {
                flex-direction: column;
            }

            .content-navbar li {
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <!-- Conteúdo principal com imagem de fundo -->
    <main>
        <h1 class="floating-title">Registro de Visitante</h1>
        <br><br>
        <form action="{{ url_for('visitante') }}" method="post">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="matricula">Matrícula/Identificação:</label>
            <input type="text" id="matricula" name="matricula" required>

            <label for="motivo">Qual sua demanda:</label>
            <select name="motivo" id="motivo" required>
                <option value="" disabled selected>Selecione uma opção</option>
                <option value="Idealizar projetos">Idealizar projetos</option>
                <option value="Emprestimo de equipamentos">Emprestimo de equipamentos</option>
                <option value="Visita Técnica">Visita Técnica</option>
                <option value="Outro">Outro</option>
            </select>

            <button type="submit" class="btn">Registrar</button>
        </form>
        <br><br>
        <br>
        <a class="btn voltar" href="{{ url_for('home') }}">Voltar</a>
    </main>

    <!-- Navbar que aparece ao rolar -->
    <nav class="content-navbar">
        <ul>
            <li><a href="https://maker.cnat.ifrn.edu.br/sobre/">Sobre</a></li>
            <li><a href="https://maker.cnat.ifrn.edu.br/estrutura/">Estrutura</a></li>
            <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSdsn-f_Bjn8tTH4d9SO943Hu-xeNNuY67R2MOF18LBCWl7-4Q/viewform">Agendamento</a></li>
        </ul>
    </nav>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 CNATMaker. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Mostrar navbar ao rolar
        window.addEventListener('scroll', function() {
            if (window.scrollY > 100) {
                document.body.classList.add('scrolled');
            } else {
                document.body.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
