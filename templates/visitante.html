<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Registro de Visitante - Lab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <img src="{{ url_for('static', filename='CNAT Maker.png') }}" alt="Logo do Lab">
        <h1>Registro de Visitante</h1>
    </header>
    <main>
        <form action="{{ url_for('visitante') }}" method="post">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="matricula">Matrícula:</label>
            <input type="text" id="matricula" name="matricula" required>

            <label for="motivo">O que veio fazer aqui:</label>
            <select name="motivo" id="motivo" required>
                <option value="" disabled selected>Selecione uma opção</option>
                <option value="Consulta">Consulta</option>
                <option value="Manutenção">Manutenção</option>
                <option value="Visita Técnica">Visita Técnica</option>
                <option value="Outro">Outro</option>
            </select>

            <button type="submit" class="btn">Registrar</button>
        </form>
        <a class="btn voltar" href="{{ url_for('home') }}">Voltar</a>
    </main>
    <footer>
        <p>&copy; 2025 Lab. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
