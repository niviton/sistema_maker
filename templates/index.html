<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNATMaker</title>
    <style>
        /* Reset CSS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            line-height: 1.6;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Hero Section */
        .hero {
            flex-grow: 1;
            text-align: center;
            padding: 180px 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://lh3.googleusercontent.com/p/AF1QipPazkvEhFazil1umg40zjbFvha7R9gnRqIWCAAT=s680-w680-h510');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .hero p {
            font-size: 1.5em;
            margin-bottom: 40px;
            font-weight: 300;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .cta-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: #78d14f;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #78d14f;
            font-size: 1.1em;
        }

        .cta-button:hover {
            background-color: transparent;
            color: #78d14f;
        }

        /* Navbar */
        .content-navbar {
            background-color: #ffffff;
            padding: 15px 0;
            width: 100%;
            text-align: center;
        }

        .content-navbar ul {
            display: inline-flex;
            list-style: none;
        }

        .content-navbar li {
            margin: 0 20px;
        }

        .content-navbar a {
            color: #000000;
            text-decoration: none;
            font-size: 1.1em;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .content-navbar a:hover {
            background-color: #78d14f;
        }

        /* Footer */
        footer {
            background-color: #78d14f;
            color: rgb(0, 0, 0);
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
        }

        /* Formulário de Iniciar (escondido) */
        .init-form {
            display: none;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .hero {
                padding: 120px 20px;
            }
            
            .hero h1 {
                font-size: 2em;
            }
            
            .hero p {
                font-size: 1.2em;
            }

            .content-navbar ul {
                flex-direction: column;
            }

            .content-navbar li {
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Bem Vindo ao CNATMaker!</h1>
            <p>Onde a imaginação vira realidade</p>
            
            <!-- Botão Iniciar que submete o formulário -->
            <a href="#" class="cta-button" onclick="document.getElementById('initForm').submit()">Iniciar</a>
            
            <!-- Formulário escondido para enviar o POST -->
            <form id="initForm" class="init-form" action="/iniciar" method="POST">
                <input type="hidden" name="iniciar" value="true">
            </form>
        </div>
    </section>

    <!-- Navbar -->
    <nav class="content-navbar">
        <ul>    
            <li><a href="https://maker.cnat.ifrn.edu.br/sobre/">Sobre</a></li>
            <li><a href="https://maker.cnat.ifrn.edu.br/estrutura/">Estrutura</a></li>
            <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSdsn-f_Bjn8tTH4d9SO943Hu-xeNNuY67R2MOF18LBCWl7-4Q/viewform">Agendamento</a></li>
        </ul>
    </nav>

    <!-- Footer -->
    <footer>
        &copy; 2025 CNATMaker. Todos os direitos reservados.
    </footer>
</body>
</html>
